name: build and push all container images
on:
  workflow_dispatch:
  schedule:
  - cron: "21 21 * * *"
  push:
    branches: ["main"]

env:
  IMAGE_REGISTRY: ghcr.io/mtk-hub
  REGISTRY_USER: ${{ github.actor }}
  REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
jobs:
  ostree-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Build container image
      uses: redhat-actions/buildah-build@v2.13
      with:
        context: "ostree-base"
        containerfiles: "ostree-base/Containerfile"
        image: ostree-base
        layers: false
        oci: true

    - name: Push to ghcr.io
      uses: redhat-actions/push-to-registry@v2.8
      with:
        image: ostree-base
        tags: "latest"
        registry: ${{ env.IMAGE_REGISTRY }}
        username: ${{ env.REGISTRY_USER }}
        password: ${{ env.REGISTRY_PASSWORD }}
        extra-args: |
          --disable-content-trust

  ostree-supermicro-x10sri-f:
    needs: ostree-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Free Disk Space (android, dotnet, boost, CodeQL)
      run: |
        sudo rm -rf /usr/local/lib/android # ~12 GB
        sudo rm -rf /usr/share/dotnet # ~2 GB
        sudo rm -rf /usr/local/share/boost # ~1 GB
        sudo rm -rf "$AGENT_TOOLSDIRECTORY/CodeQL" # ~5 GB

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Build container image
      uses: redhat-actions/buildah-build@v2.13
      with:
        context: "ostree-supermicro-x10sri-f"
        containerfiles: "ostree-supermicro-x10sri-f/Containerfile"
        image: ostree-supermicro-x10sri-f
        layers: false
        oci: true

    - name: Push to ghcr.io
      uses: redhat-actions/push-to-registry@v2.8
      with:
        image: ostree-supermicro-x10sri-f
        tags: "latest"
        registry: ${{ env.IMAGE_REGISTRY }}
        username: ${{ env.REGISTRY_USER }}
        password: ${{ env.REGISTRY_PASSWORD }}
        extra-args: |
          --disable-content-trust
